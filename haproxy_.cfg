global
    log /dev/log    local0
    log /dev/log    local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

listen stats
    bind :888
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    stats realm Haproxy\ Statistics

frontend web_frontend
    bind :1325
    mode http

    acl is_example_local hdr_dom(host) -i example.local
    http-request deny if !is_example_local
    use_backend web_weighted if is_example_local

backend web_weighted
    mode http
    balance roundrobin
    option httpchk
    http-check send meth GET uri /
    http-check expect status 200
    server s1 213.165.218.255:8888 weight 2 check inter 3s
    server s2 158.160.31.117:9999 weight 3 check inter 3s
    server s3 213.165.209.31:7777 weight 4 check inter 3s

